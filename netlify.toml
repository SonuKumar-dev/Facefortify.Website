[build]
  publish = "."
  
[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[redirects]]
  from = "/download"
  to = "/#download"
  status = 200

[[redirects]]
  from = "/github"
  to = "https://github.com/SonuKumar-dev/FaceFortify"
  status = 301

[[redirects]]
  from = "/releases"
  to = "https://github.com/SonuKumar-dev/FaceFortify/releases"
  status = 301
